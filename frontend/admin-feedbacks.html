<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Feedbacks</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .feedback-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .feedback-table th,
        .feedback-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .feedback-table th {
            background-color: #0077cc;
            color: white;
        }

        .feedback-table tr:hover {
            background-color: #f1f1f1;
        }

        .rating-star {
            color: #f4b400;
        }
    </style>
</head>

<body>

    <header>
        <div class="container header-content">
            <h1 class="brand">QuickClean Admin</h1>
            <nav>
                <a href="index.html">Home</a>
            </nav>
        </div>
    </header>

    <div class="container" style="padding: 40px 0;">
        <h2>Customer Feedbacks</h2>
        <div id="loading">Loading feedbacks...</div>
        <table class="feedback-table" id="feedbackTable" style="display: none;">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Rating</th>
                    <th>Comment</th>
                </tr>
            </thead>
            <tbody id="feedbackBody">
                <!-- Feedbacks will be inserted here -->
            </tbody>
        </table>
    </div>

    <footer class="footer">
        <p>© 2025 QuickClean Laundry Services. All rights reserved.</p>
    </footer>

    <script>
        async function fetchFeedbacks() {
            try {
                const response = await fetch('/api/feedback');
                const data = await response.json();

                const loading = document.getElementById('loading');
                const table = document.getElementById('feedbackTable');
                const tbody = document.getElementById('feedbackBody');

                if (data.success) {
                    loading.style.display = 'none';
                    if (data.data.length === 0) {
                        loading.style.display = 'block';
                        loading.textContent = 'No feedbacks found.';
                        return;
                    }

                    table.style.display = 'table';
                    tbody.innerHTML = data.data.map(feedback => `
            <tr>
              <td>${new Date(feedback.createdAt).toLocaleDateString()}</td>
              <td>${feedback.name}</td>
              <td>${feedback.email || '-'}</td>
              <td>${'<span class="rating-star">★</span>'.repeat(feedback.rating)}</td>
              <td>${feedback.comment}</td>
            </tr>
          `).join('');
                } else {
                    loading.textContent = 'Failed to load feedbacks.';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').textContent = 'Error loading feedbacks.';
            }
        }

        document.addEventListener('DOMContentLoaded', fetchFeedbacks);
    </script>

</body>

</html>
